<div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow">
    <h5 class="my-0 mr-md-auto font-weight-normal">Уютный домик</h5>
    <nav class="ms-5">
        <a class="p-2 btn btn-outline-primary" href="{% url 'restaurant:home' %}">Главная страница</a>
        <a class="p-2 btn btn-outline-primary" href="{% url 'restaurant:table_list' %}">Список столов</a>
        <a class="p-2 btn btn-outline-primary" href="{% url 'restaurant:contacts' %}">Наши контакты</a>
        {% if user.is_authenticated %}
        <a class="p-2 btn btn-outline-primary" href="{% url 'restaurant:table_create' %}">Создать карточку стола</a>
        {% endif%}
        {% if user.is_authenticated %}
        <form method="post" action="{% url 'users:logout' %}" style="display: imline">
            {% csrf_token %}
            <button type="submit" class="p-2 btn btn-outline-primary">Выйти</button>
        </form>
        {% else %}
        <a class="p-2 btn btn-outline-primary" href="{% url 'users:login' %}">Войти</a>
        <a class="p-2 btn btn-outline-primary" href="{% url 'users:register' %}">Регистрация</a>
        {% endif %}
        {% if user.is_authenticated %}
        <div class="ml-auto order-last d-none d-sm-block">
            Привет, {{ user.username }}!
        </div>
        {% endif %}
    </nav>
</div>
